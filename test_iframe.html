<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>iframeテスト</title>
<style>
body { margin: 0; display: flex; height: 100vh; background: #0d1117; }
.left  { flex: 1; padding: 40px; color: #e2eaf3; font-family: sans-serif; }
.right { flex: 1; border-left: 1px solid #2a3441; }
iframe { width: 100%; height: 100%; border: none; }
</style>
</head>
<body>
  <div class="left">
    <h2>左ペイン：説明エリア</h2>
    <p>右にGuacamoleが表示されていればOKです。</p>
  </div>
  <div class="right">
    <iframe src="https://infra-study.org/guacamole/"></iframe>
  </div>
</body>
</html>
